<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="840" viewBox="0 0 1440 840" font-family="'Space Grotesk','Segoe UI',Arial,sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=JetBrains+Mono&amp;display=swap');</style>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 880) scale(820 560)">
      <stop offset="0" stop-color="#4d6bff" stop-opacity="0.6"/><stop offset="1" stop-color="#4d6bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1150 120) scale(640 520)">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.34"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(740 1020) scale(720 560)">
      <stop offset="0" stop-color="#38e1ff" stop-opacity="0.3"/><stop offset="1" stop-color="#38e1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.45" stop-color="#38e1ff"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>

  <rect width="1440" height="840" fill="#06070d"/>
  <rect width="1440" height="840" fill="url(#g1)"/>
  <rect width="1440" height="840" fill="url(#g2)"/>
  <rect width="1440" height="840" fill="url(#g3)"/>
  <rect width="1440" height="840" fill="url(#vig)"/>
  <rect width="1440" height="840" filter="url(#noise)" opacity="0.05"/>

  <!-- nav -->
  <g>
    <circle cx="50" cy="46" r="5" fill="#38e1ff"/>
    <text x="66" y="51" fill="#eef1fb" font-size="15" font-weight="700" letter-spacing="2">INVINCIBLE PROS</text>
    <text x="600" y="51" fill="#9aa3b8" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2">DOMAINS</text>
    <text x="720" y="51" fill="#9aa3b8" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2">MANIFESTO</text>
    <text x="860" y="51" fill="#9aa3b8" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2">CONTACT</text>
    <rect x="1230" y="30" width="170" height="34" rx="17" fill="none" stroke="#eef1fb" stroke-opacity="0.25"/>
    <text x="1315" y="51" fill="#eef1fb" font-size="11" font-family="'JetBrains Mono',monospace" letter-spacing="2" text-anchor="middle">START A PROJECT →</text>
  </g>

  <!-- statement -->
  <g>
    <circle cx="46" cy="286" r="4" fill="#38e1ff"/>
    <text x="60" y="291" fill="#eef1fb" font-size="15" font-weight="700" letter-spacing="2">INVINCIBLE PROS</text>
    <text x="270" y="291" fill="#9aa3b8" font-size="11" font-family="'JetBrains Mono',monospace" letter-spacing="2">— DIGITAL ENGINEERING</text>

    <text x="40" y="440" fill="#eef1fb" font-size="140" font-weight="700" letter-spacing="-4">WE ENGINEER</text>
    <text x="40" y="580" fill="url(#acc)" font-size="140" font-weight="700" letter-spacing="-4">THE FUTURE</text>

    <text x="42" y="648" fill="#c7cde0" font-size="19">Software · Intelligence · Design · Infrastructure · Hardware · Experience.</text>
    <text x="42" y="676" fill="#c7cde0" font-size="19">Six domains, one relentless studio.</text>

    <rect x="42" y="708" width="180" height="46" rx="23" fill="url(#acc)"/>
    <text x="132" y="737" fill="#06070d" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2" font-weight="700" text-anchor="middle">START A PROJECT →</text>
    <rect x="234" y="708" width="150" height="46" rx="23" fill="none" stroke="#eef1fb" stroke-opacity="0.28"/>
    <text x="309" y="737" fill="#eef1fb" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2" text-anchor="middle">VIEW OUR WORK</text>
  </g>

  <!-- stat bottom-right -->
  <g text-anchor="end">
    <text x="1398" y="700" fill="url(#acc)" font-size="58" font-weight="700">38</text>
    <text x="1398" y="726" fill="#9aa3b8" font-size="11" font-family="'JetBrains Mono',monospace" letter-spacing="2">CAPABILITIES</text>
    <text x="1398" y="744" fill="#9aa3b8" font-size="11" font-family="'JetBrains Mono',monospace" letter-spacing="2">ENGINEERED</text>
  </g>
</svg>
