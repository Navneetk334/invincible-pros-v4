<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="840" viewBox="0 0 1440 840" font-family="'Space Grotesk','Segoe UI',Arial,sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=JetBrains+Mono&amp;display=swap');</style>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(330 940) scale(760 520)">
      <stop offset="0" stop-color="#4d6bff" stop-opacity="0.6"/><stop offset="1" stop-color="#4d6bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 60) scale(620 480)">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.32"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 1040) scale(680 560)">
      <stop offset="0" stop-color="#38e1ff" stop-opacity="0.3"/><stop offset="1" stop-color="#38e1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.45" stop-color="#38e1ff"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>

  <rect width="1440" height="840" fill="#06070d"/>
  <rect width="1440" height="840" fill="url(#g1)"/>
  <rect width="1440" height="840" fill="url(#g2)"/>
  <rect width="1440" height="840" fill="url(#g3)"/>
  <rect width="1440" height="840" fill="url(#vig)"/>
  <rect width="1440" height="840" filter="url(#noise)" opacity="0.05"/>

  <!-- nav -->
  <g>
    <circle cx="50" cy="46" r="5" fill="#38e1ff"/>
    <text x="66" y="51" fill="#eef1fb" font-size="15" font-weight="700" letter-spacing="2">INVINCIBLE PROS</text>
    <text x="600" y="51" fill="#9aa3b8" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2">DOMAINS</text>
    <text x="720" y="51" fill="#9aa3b8" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2">MANIFESTO</text>
    <text x="860" y="51" fill="#9aa3b8" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2">CONTACT</text>
    <rect x="1230" y="30" width="170" height="34" rx="17" fill="none" stroke="#eef1fb" stroke-opacity="0.25"/>
    <text x="1315" y="51" fill="#eef1fb" font-size="11" font-family="'JetBrains Mono',monospace" letter-spacing="2" text-anchor="middle">START A PROJECT →</text>
  </g>

  <!-- center stage -->
  <g text-anchor="middle">
    <text x="720" y="250" fill="#9aa3b8" font-size="13" font-family="'JetBrains Mono',monospace" letter-spacing="7">DIGITAL ENGINEERING STUDIO</text>
    <text x="720" y="400" fill="#eef1fb" font-size="150" font-weight="700" letter-spacing="-4">INVINCIBLE</text>
    <text x="720" y="540" fill="url(#acc)" font-size="150" font-weight="700" letter-spacing="-4">PROS</text>
    <text x="720" y="610" fill="#c7cde0" font-size="19">We engineer software, intelligence, design, infrastructure, hardware and live</text>
    <text x="720" y="638" fill="#c7cde0" font-size="19">experience — under one roof, for companies that intend to win.</text>
    <!-- buttons -->
    <rect x="545" y="680" width="180" height="46" rx="23" fill="url(#acc)"/>
    <text x="635" y="709" fill="#06070d" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2" font-weight="700">START A PROJECT →</text>
    <rect x="737" y="680" width="240" height="46" rx="23" fill="none" stroke="#eef1fb" stroke-opacity="0.28"/>
    <text x="857" y="709" fill="#eef1fb" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="2">EXPLORE THE SIX DOMAINS</text>
  </g>

  <!-- scroll cue -->
  <g text-anchor="middle">
    <rect x="719" y="770" width="1" height="34" fill="#eef1fb" opacity="0.6"/>
    <text x="720" y="826" fill="#9aa3b8" font-size="10" font-family="'JetBrains Mono',monospace" letter-spacing="4">SCROLL TO ENTER</text>
  </g>
</svg>
